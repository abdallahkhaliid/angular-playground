<div class="account-creator-card">
  <div class="card-header">
    <h3>Create New Account</h3>
    <p>Enter the account details below to get started</p>
  </div>
  
  <div class="card-body">
    <div class="form-group mb-4">
      <label for="name" class="form-label">Account Name</label>
      <input 
        type="text" 
        id="name" 
        class="form-control modern-input" 
        placeholder="Enter name..." 
        #nameInput />
    </div>

    <div class="form-group mb-4">
      <label for="status" class="form-label">Initial Status</label>
      <select id="status" class="form-control modern-select" #statusInput>
        <option value="active">Active</option>
        <option value="inactive">Inactive</option>
        <option value="hidden">Hidden</option>
      </select>
    </div>

    <div class="d-grid">
      <button 
        class="btn btn-premium" 
        (click)="onAddAccount(nameInput.value, statusInput.value); nameInput.value = ''">
        Add Account
      </button>
    </div>
  </div>
</div>
