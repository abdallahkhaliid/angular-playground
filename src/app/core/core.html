<div class="row">
  <div class="col-xs-12"></div>
  <p>Add new Server or Blueprint</p>
  Server Name
  <label for="server-name">Server Name:</label>
  <input type="text" id="server-name" class="form-control" #serverNameInput />

  Server Contnet
  <label for="server-name">Server Contnet</label>
  <input type="text" id="server-name" class="form-control" #serverContentInput />
  <br />
  <hr />
  <button class="btn btn-primary" (click)="onServerAdded(serverNameInput)">Add Server</button>
  <button class="btn btn-success" (click)="onBlueprintAdded(serverNameInput)">
    Add Server Blueprint
  </button>
</div>
